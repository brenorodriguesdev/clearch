services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_CLIENT: mongodb
      DB_HOST: mongodb
      DB_PORT: "27017"
      DB_NAME: app_db
      MONGO_URL: mongodb://mongodb:27017/app_db
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
